<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mandalorian - Rent Episodes</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <main class="container">
        <header>
            <h1 class="glow-title">THE MANDALORIAN</h1>
            <p class="subtitle">Bounty Hunter Network - Episode Rental</p>
        </header>

        <section id="episodes-container" class="episodes-grid">
            <!-- Los episodios se cargarán aquí por JS -->
            <div class="loading">Cargando la Holored...</div>
        </section>
    </main>

    <!-- Modal de confirmación de pago -->
    <div id="payment-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h2>Confirmar Carga de Créditos</h2>
            <p id="payment-desc">Estás confirmando el pago del capítulo.</p>
            <p><strong>Precio Mínimo:</strong> 50 Créditos de la Nueva República</p>
            
            <div class="input-group">
                <label for="price-input">Monto (Créditos):</label>
                <input type="number" id="price-input" value="50" min="1">
            </div>
            
            <div class="modal-actions">
                <button id="cancel-payment-btn" class="btn outline-btn">Cancelar</button>
                <button id="confirm-payment-btn" class="btn primary-btn">Transferir Créditos</button>
            </div>
        </div>
    </div>

    <!-- Tostadas de notificación -->
    <div id="toast-container"></div>

    <script src="/static/app.js"></script>
</body>
</html>
